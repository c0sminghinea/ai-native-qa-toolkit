name: Playwright Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Nightly at 06:00 UTC — catches regressions from upstream site changes
    - cron: '0 6 * * *'

# Cancel any in-progress run for the same branch/PR when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Cache Groq AI responses
        uses: actions/cache@v4
        with:
          path: .cache/groq
          key: groq-${{ runner.os }}-${{ hashFiles('ai-tools/**/*.ts') }}
          restore-keys: |
            groq-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts

      - name: Format check
        run: npx prettier --check .

      - name: Repo-wide secret scan (regex)
        run: npm run check:secrets

      - name: Unit tests (vitest)
        run: npm run test:unit:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: runs/coverage/
          retention-days: 14

      - name: README drift check
        run: npm run check:docs

      - name: Run tests
        run: npx playwright test
        env:
          # Set BASE_URL as a GitHub Actions variable (not secret) to override target
          BASE_URL: ${{ vars.BASE_URL || 'https://cal.com' }}
          # Required by any AI tool exercised during e2e. Tests that don't hit
          # the LLM still run cleanly when this is empty (lazy client check).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CI: true
          GROQ_CACHE: '1'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
